# ============================================================
# 🐳 DOCKER COMPOSE - PythonPro Stack
# ============================================================
# Stack completo con:
# - PostgreSQL (database)
# - Redis (cache e sessioni)
# - Backend FastAPI
# - Frontend React
# ============================================================

services:
  # === DATABASE POSTGRESQL ===
  db:
    image: postgres:15-alpine
    container_name: pythonpro_db
    environment:
      POSTGRES_DB: ${DB_NAME:-gestionale}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=it_IT.utf8"
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-gestionale}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - pythonpro_net
    labels:
      - "com.project=pythonpro"
      - "com.role=db"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # === CACHE REDIS ===
  redis:
    image: redis:7-alpine
    container_name: pythonpro_redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-changeme_redis_pwd}
    ports:
      - "${REDIS_PORT:-6381}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - pythonpro_net
    labels:
      - "com.project=pythonpro"
      - "com.role=cache"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # === BACKEND API (FastAPI) ===
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      # Database
      DATABASE_URL: postgresql+psycopg://${DB_USER:-admin}:${DB_PASSWORD:-changeme_in_production}@db:5432/${DB_NAME:-gestionale}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      DB_NAME: ${DB_NAME:-gestionale}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_redis_pwd}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis_pwd}@redis:6379/0
      REDIS_DB: 0
      PYTHONPRO_OUTBOUND_WEBHOOK_URL: ${PYTHONPRO_OUTBOUND_WEBHOOK_URL:-http://webhook_sink:8080}

      # Server
      PORT: 8000
      WORKERS: ${WORKERS:-2}
      TIMEOUT: ${TIMEOUT:-60}
      GRACEFUL_TIMEOUT: ${GRACEFUL_TIMEOUT:-20}

      # Security
      SECRET_KEY: ${JWT_SECRET_KEY:-changeme_secret_key_super_sicura}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-changeme_secret_key_super_sicura}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-}
      OPERATOR_DEFAULT_PASSWORD: ${OPERATOR_DEFAULT_PASSWORD:-}

      # Environment
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-False}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3001}

      # Alembic
      ALEMBIC_CONFIG: /app/alembic.ini
      AUTO_BACKUP_ENABLED: "false"
      BACKUP_DIR: /app/backups
      AI_AGENT_LLM_PROVIDER: ${AI_AGENT_LLM_PROVIDER:-none}
      AI_AGENT_LLM_MODEL: ${AI_AGENT_LLM_MODEL:-}
      AI_AGENT_LLM_TIMEOUT_SECONDS: ${AI_AGENT_LLM_TIMEOUT_SECONDS:-25}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OPENCLAW_BASE_URL: ${OPENCLAW_BASE_URL:-http://host.docker.internal:18789}
      OPENCLAW_API_KEY: ${OPENCLAW_API_KEY:-}
      OPENCLAW_CHAT_PATH: ${OPENCLAW_CHAT_PATH:-/v1/chat/completions}
      ENABLE_WHATSAPP: ${ENABLE_WHATSAPP:-false}
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-meta}
      WHATSAPP_PROVIDER_URL: ${WHATSAPP_PROVIDER_URL:-}
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN:-}
      WHATSAPP_SENDER_ID: ${WHATSAPP_SENDER_ID:-}
      WHATSAPP_TIMEOUT_SECONDS: ${WHATSAPP_TIMEOUT_SECONDS:-15}
      WHATSAPP_META_PHONE_NUMBER_ID: ${WHATSAPP_META_PHONE_NUMBER_ID:-}
      WHATSAPP_META_GRAPH_VERSION: ${WHATSAPP_META_GRAPH_VERSION:-v17.0}
      WHATSAPP_META_BASE_URL: ${WHATSAPP_META_BASE_URL:-https://graph.facebook.com}
      WHATSAPP_META_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_META_WEBHOOK_VERIFY_TOKEN:-}
      GMAIL_IMAP_USER: ${GMAIL_IMAP_USER:-}
      GMAIL_IMAP_APP_PASSWORD: ${GMAIL_IMAP_APP_PASSWORD:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@gestionale.local}
      SMTP_TEST_MODE: ${SMTP_TEST_MODE:-true}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      ENABLE_EMAIL: ${ENABLE_EMAIL:-false}
      INBOX_POLL_INTERVAL_SECONDS: ${INBOX_POLL_INTERVAL_SECONDS:-300}
      MAX_ATTACHMENT_MB: ${MAX_ATTACHMENT_MB:-10}
    container_name: pythonpro_backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 24
      start_period: 120s
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
      - backend_backups:/app/backups
      - ./backend:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - pythonpro_net
    labels:
      - "com.project=pythonpro"
      - "com.role=backend"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  # === ARQ WORKER ===
  arq_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app
    entrypoint: ["arq"]
    command: ["arq_worker.WorkerSettings"]
    environment:
      DATABASE_URL: postgresql+psycopg://${DB_USER:-admin}:${DB_PASSWORD:-changeme_in_production}@db:5432/${DB_NAME:-gestionale}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_redis_pwd}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis_pwd}@redis:6379/0
      REDIS_DB: 0
      PYTHONPRO_OUTBOUND_WEBHOOK_URL: ${PYTHONPRO_OUTBOUND_WEBHOOK_URL:-http://webhook_sink:8080}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AI_AGENT_LLM_PROVIDER: ${AI_AGENT_LLM_PROVIDER:-none}
      AI_AGENT_LLM_MODEL: ${AI_AGENT_LLM_MODEL:-}
      AI_AGENT_LLM_TIMEOUT_SECONDS: ${AI_AGENT_LLM_TIMEOUT_SECONDS:-25}
      ENABLE_WHATSAPP: ${ENABLE_WHATSAPP:-false}
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-meta}
      WHATSAPP_PROVIDER_URL: ${WHATSAPP_PROVIDER_URL:-}
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN:-}
      WHATSAPP_SENDER_ID: ${WHATSAPP_SENDER_ID:-}
      WHATSAPP_TIMEOUT_SECONDS: ${WHATSAPP_TIMEOUT_SECONDS:-15}
      WHATSAPP_META_PHONE_NUMBER_ID: ${WHATSAPP_META_PHONE_NUMBER_ID:-}
      WHATSAPP_META_GRAPH_VERSION: ${WHATSAPP_META_GRAPH_VERSION:-v17.0}
      WHATSAPP_META_BASE_URL: ${WHATSAPP_META_BASE_URL:-https://graph.facebook.com}
      WHATSAPP_META_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_META_WEBHOOK_VERIFY_TOKEN:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OPENCLAW_BASE_URL: ${OPENCLAW_BASE_URL:-http://host.docker.internal:18789}
      OPENCLAW_API_KEY: ${OPENCLAW_API_KEY:-}
      OPENCLAW_CHAT_PATH: ${OPENCLAW_CHAT_PATH:-/v1/chat/completions}
      GMAIL_IMAP_USER: ${GMAIL_IMAP_USER:-}
      GMAIL_IMAP_APP_PASSWORD: ${GMAIL_IMAP_APP_PASSWORD:-}
      INBOX_POLL_INTERVAL_SECONDS: ${INBOX_POLL_INTERVAL_SECONDS:-300}
      MAX_ATTACHMENT_MB: ${MAX_ATTACHMENT_MB:-10}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@gestionale.local}
      ENABLE_EMAIL: ${ENABLE_EMAIL:-false}
    container_name: pythonpro_arq_worker
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - pythonpro_net
    labels:
      - "com.project=pythonpro"
      - "com.role=worker"
    healthcheck:
      disable: true

  # === WEBHOOK SINK (test endpoint locale) ===
  webhook_sink:
    image: mendhak/http-https-echo:31
    container_name: pythonpro_webhook_sink
    ports:
      - "8099:8080"
    restart: unless-stopped
    networks:
      - pythonpro_net
    labels:
      - "com.project=pythonpro"
      - "com.role=webhook-sink"

  # === BACKUP SCHEDULER ===
  backup_scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app
    entrypoint: ["python", "run_backup.py", "schedule"]
    environment:
      DATABASE_URL: postgresql+psycopg://${DB_USER:-admin}:${DB_PASSWORD:-changeme_in_production}@db:5432/${DB_NAME:-gestionale}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      DB_NAME: ${DB_NAME:-gestionale}
      BACKUP_DIR: /app/backups
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-30}
      BACKUP_DAILY_TIME: ${BACKUP_DAILY_TIME:-02:00}
      BACKUP_WEEKLY_TIME: ${BACKUP_WEEKLY_TIME:-03:00}
      BACKUP_MONTHLY_INTERVAL_DAYS: ${BACKUP_MONTHLY_INTERVAL_DAYS:-30}
      AUTO_BACKUP_ENABLED: "true"
    container_name: pythonpro_backup_scheduler
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      disable: true
    volumes:
      - backend_backups:/app/backups
      - ./backend:/app
    restart: unless-stopped
    networks:
      - pythonpro_net
    labels:
      - "com.project=pythonpro"
      - "com.role=backup"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # === DOCUMENTI SCADENZE SCHEDULER ===
  check_scadenze_scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app
    entrypoint: ["python", "jobs/check_scadenze.py", "schedule"]
    command: ["--time", "${CHECK_SCADENZE_TIME:-08:00}"]
    environment:
      DATABASE_URL: postgresql+psycopg://${DB_USER:-admin}:${DB_PASSWORD:-changeme_in_production}@db:5432/${DB_NAME:-gestionale}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      DB_NAME: ${DB_NAME:-gestionale}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@gestionale.local}
      SMTP_TEST_MODE: ${SMTP_TEST_MODE:-true}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    container_name: pythonpro_check_scadenze_scheduler
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped
    networks:
      - pythonpro_net
    labels:
      - "com.project=pythonpro"
      - "com.role=document-scheduler"
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 128M

  # === FRONTEND (React) ===
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-}
    container_name: pythonpro_frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    restart: unless-stopped
    networks:
      - pythonpro_net
    labels:
      - "com.project=pythonpro"
      - "com.role=frontend"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

# === VOLUMES (Persist Data) ===
volumes:
  db_data:
    name: ${COMPOSE_PROJECT_NAME:-pythonpro}_db_data
    driver: local
  redis_data:
    name: ${COMPOSE_PROJECT_NAME:-pythonpro}_redis_data
    driver: local
  backend_uploads:
    name: ${COMPOSE_PROJECT_NAME:-pythonpro}_backend_uploads
    driver: local
  backend_logs:
    name: ${COMPOSE_PROJECT_NAME:-pythonpro}_backend_logs
    driver: local
  backend_backups:
    name: ${COMPOSE_PROJECT_NAME:-pythonpro}_backend_backups
    driver: local

# === NETWORK ===
networks:
  pythonpro_net:
    name: ${COMPOSE_PROJECT_NAME:-pythonpro}_net
    driver: bridge

# ============================================================
# COMANDI UTILI:
# ------------------------------------------------------------
# Preflight check:   make preflight
# Avvio stack:       make up
# Stop stack:        make down
# View logs:         make logs
# Smoke test:        make smoke
# ============================================================
