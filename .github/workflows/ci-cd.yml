# =================================================================
# FILE: ci-cd.yml
# =================================================================
# SCOPO: Pipeline CI/CD automatizzata con GitHub Actions
#
# TRIGGER:
# - Push su branch main/develop
# - Pull Request verso main
# - Tag rilasci (v*.*.*)
#
# JOBS:
# 1. test-backend: Unit tests Python/FastAPI
# 2. test-frontend: Unit tests React/Jest
# 3. build-and-push: Build immagini Docker e push su registry
# 4. deploy: Deploy su ambiente (staging/production)
#
# SECRETS NECESSARI (configurare in GitHub repo settings):
# - DOCKER_USERNAME: Username Docker Hub
# - DOCKER_PASSWORD: Password/token Docker Hub
# - DEPLOY_HOST: Server deploy (se auto-deploy)
# - DEPLOY_KEY: SSH key per deploy
# =================================================================

name: CI/CD Pipeline

# =================================================================
# TRIGGER EVENTS
# =================================================================
on:
  # Trigger su push a branch specifici
  push:
    branches:
      - main
      - develop
    # Trigger su tag releases
    tags:
      - 'v*.*.*'

  # Trigger su pull request verso main
  pull_request:
    branches:
      - main

  # Permetti esecuzione manuale
  workflow_dispatch:

# =================================================================
# ENVIRONMENT VARIABLES GLOBALI
# =================================================================
env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  DOCKER_IMAGE_BACKEND: 'gestionaleapp/backend'
  DOCKER_IMAGE_FRONTEND: 'gestionaleapp/frontend'

# =================================================================
# JOBS
# =================================================================
jobs:

  # ---------------------------------------------------------------
  # JOB 1: TEST BACKEND
  # ---------------------------------------------------------------
  test-backend:
    name: Test Backend (Python/FastAPI)
    runs-on: ubuntu-latest

    # Service containers per test (database)
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Checkout codice
      - name: Checkout repository
        uses: actions/checkout@v3

      # Setup Python
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'  # Cache pip dependencies

      # Install dipendenze
      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist

      # Esegui linting (flake8)
      - name: Lint with flake8
        run: |
          pip install flake8
          cd backend
          # Stop on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero tratta tutti gli errori come warning
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true  # Non bloccare su warning

      # Esegui tests con coverage
      - name: Run tests with pytest
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        run: |
          cd backend
          pytest test_main.py -v --cov=. --cov-report=xml --cov-report=term-missing

      # Upload coverage report
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true  # Non bloccare se Codecov fail

      # Cache dependencies per run successivi
      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}


  # ---------------------------------------------------------------
  # JOB 2: TEST FRONTEND
  # ---------------------------------------------------------------
  test-frontend:
    name: Test Frontend (React/Jest)
    runs-on: ubuntu-latest

    steps:
      # Checkout codice
      - name: Checkout repository
        uses: actions/checkout@v3

      # Setup Node.js
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Install dependencies
      - name: Install dependencies
        run: |
          cd frontend
          npm ci  # Usa npm ci invece di npm install (più veloce e deterministico)

      # Esegui linting (ESLint)
      - name: Lint with ESLint
        run: |
          cd frontend
          npm run lint || true  # Non bloccare su warning
        continue-on-error: true

      # Esegui tests
      - name: Run tests with Jest
        run: |
          cd frontend
          npm test -- --coverage --watchAll=false --passWithNoTests

      # Upload coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
        continue-on-error: true

      # Build production per verificare che compili
      - name: Build production
        run: |
          cd frontend
          npm run build

      # Cache node_modules
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}


  # ---------------------------------------------------------------
  # JOB 3: BUILD E PUSH DOCKER IMAGES
  # ---------------------------------------------------------------
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]  # Esegui solo se test passano

    # Esegui solo su push a main (non su PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v3

      # Setup Docker Buildx (per build multi-platform)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Estrai metadata (tags, labels)
      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.DOCKER_IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      # Build e push backend image
      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha  # GitHub Actions cache
          cache-to: type=gha,mode=max

      # Estrai metadata frontend
      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.DOCKER_IMAGE_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      # Build e push frontend image
      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ---------------------------------------------------------------
  # JOB 4: DEPLOY (Opzionale - configurare in base a infra)
  # ---------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/develop'

    environment:
      name: staging
      url: https://staging.gestionale.com

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v3

      # Deploy via SSH (esempio generico)
      # Adattare in base alla propria infrastruttura
      - name: Deploy to staging server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_KEY }}
          script: |
            cd /opt/gestionale
            docker-compose pull
            docker-compose up -d
            docker-compose exec backend alembic upgrade head

      # Health check post-deploy
      - name: Health check
        run: |
          sleep 30  # Attendi startup
          curl -f https://staging.gestionale.com/health || exit 1


  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: startsWith(github.ref, 'refs/tags/v')  # Solo su tag releases

    environment:
      name: production
      url: https://gestionale.com

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v3

      # Deploy production
      - name: Deploy to production server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_KEY }}
          script: |
            cd /opt/gestionale
            docker-compose pull
            docker-compose up -d --no-deps backend frontend
            docker-compose exec backend alembic upgrade head

      # Health check
      - name: Health check production
        run: |
          sleep 60
          curl -f https://gestionale.com/health || exit 1

      # Notifica Slack/Discord (opzionale)
      - name: Notify deployment
        run: |
          echo "Deployment to production completed successfully"
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"🚀 Gestionale v${{ github.ref_name }} deployed to production"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}


