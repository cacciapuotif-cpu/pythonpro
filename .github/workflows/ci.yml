# ============================================================
# 🔄 CI/CD PIPELINE - GitHub Actions
# ============================================================
# Pipeline automatica che esegue:
# - Linting e formattazione codice
# - Type checking
# - Test con coverage ≥85%
# - Security scanning
# - Build Docker images
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:  # Permette run manuale

# Concurrency: cancella run precedenti se nuovo push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  # ============================================================
  # JOB 1: LINT E CODE QUALITY
  # ============================================================
  lint:
    name: 🔍 Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort

      - name: 🔍 Run Ruff linter
        run: |
          cd backend
          ruff check app/ --output-format=github

      - name: ✨ Check code formatting (Black)
        run: |
          cd backend
          black --check app/

      - name: 📋 Check import sorting (isort)
        run: |
          cd backend
          isort --check-only app/

  # ============================================================
  # JOB 2: TYPE CHECKING
  # ============================================================
  typecheck:
    name: 🔬 Type Checking
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd backend
          pip install -r requirements.txt
          pip install mypy types-redis

      - name: 🔬 Run MyPy
        run: |
          cd backend
          mypy app/ --config-file=pyproject.toml || true

  # ============================================================
  # JOB 3: SECURITY SCANNING
  # ============================================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit safety

      - name: 🔒 Run Bandit (code security)
        run: |
          cd backend
          bandit -r app/ -ll -f json -o bandit-report.json || true
          bandit -r app/ -ll

      - name: 🔒 Run pip-audit (dependencies)
        run: |
          cd backend
          pip install -r requirements.txt
          pip-audit --desc || true

      - name: 📊 Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: backend/bandit-report.json
          retention-days: 30

  # ============================================================
  # JOB 4: TESTS CON COVERAGE
  # ============================================================
  test:
    name: 🧪 Tests & Coverage
    runs-on: ubuntu-latest

    services:
      # PostgreSQL per test integrazione
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: gestionale_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis per test cache
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-mock pytest-xdist

      - name: 🧪 Run tests with coverage
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/gestionale_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET_KEY: test_secret_key_for_ci
          ENVIRONMENT: test
        run: |
          cd backend
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=85 \
            -v \
            --maxfail=3

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: 📊 Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/htmlcov/
          retention-days: 30

  # ============================================================
  # JOB 5: BUILD DOCKER IMAGES
  # ============================================================
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: gestionale-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🐳 Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: gestionale-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # JOB 6: DEPLOYMENT (solo su main)
  # ============================================================
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to production
        run: |
          echo "🚀 Deployment step"
          echo "Qui si configura il deploy su server produzione"
          echo "Es: Docker registry, Kubernetes, cloud provider, ecc."
          # Esempio:
          # docker login ...
          # docker push ...
          # kubectl apply ...

# ============================================================
# NOTE:
# - Configurare secrets in GitHub Settings > Secrets:
#   - CODECOV_TOKEN (opzionale per codecov)
#   - DOCKER_USERNAME e DOCKER_PASSWORD (se push su registry)
# - Personalizzare step di deploy in base a infrastruttura
# ============================================================
