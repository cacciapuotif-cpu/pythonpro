# =================================================================
# FILE: pytest.ini
# =================================================================
# SCOPO: Configurazione pytest per il progetto
#
# Questo file configura il comportamento di pytest:
# - Percorsi di ricerca test
# - Output e verbosity
# - Coverage settings
# - Markers personalizzati
# =================================================================

[pytest]
# Dove cercare i file di test
# Pattern: test_*.py o *_test.py
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opzioni di default per pytest
addopts =
    # Verbosity: -v = verbose, -vv = molto verbose
    -v
    # Mostra summary di test failed/passed
    -ra
    # Mostra durata test più lenti
    --durations=10
    # Strict markers (errore se marker non definito)
    --strict-markers
    # Coverage automatico
    --cov=.
    --cov-report=term-missing
    --cov-report=html
    # Warning settings
    -W ignore::DeprecationWarning

# Markers personalizzati per categorizzare test
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    smoke: marks tests as smoke tests (quick validation)

# Minimum coverage richiesto (fallisce se sotto)
[coverage:report]
fail_under = 80

# File da escludere dal coverage
[coverage:run]
omit =
    test_*.py
    *_test.py
    */tests/*
    */venv/*
    */migrations/*
