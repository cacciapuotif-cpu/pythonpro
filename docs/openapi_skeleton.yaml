openapi: 3.1.0
info:
  title: Gestionale Collaboratori e Progetti
  description: "\n    Sistema gestionale completo per:\n    - \U0001F465 Collaboratori\
    \ (anagrafica, ruoli, tariffe)\n    - \U0001F4CB Progetti (budget, ente attuatore,\
    \ stato)\n    - \U0001F4DD Incarichi (assegnazioni ai progetti con mansioni)\n\
    \    - ⏰ Presenze (rilevazioni orarie con validazioni)\n    - \U0001F4C4 Contratti\
    \ (collaborazione, P.IVA, subordinato)\n    - \U0001F4B0 Rendicontazione (FSE+,\
    \ Fondimpresa, PNRR)\n    "
  version: 1.0.0
paths:
  /:
    get:
      tags:
      - Sistema
      summary: Root
      description: "**Endpoint Root** - Benvenuto e informazioni base\n\nQuesto endpoint\
        \ fornisce informazioni generali sull'API.\nUtile per:\n- Verificare che il\
        \ server sia attivo\n- Vedere la versione corrente\n- Sapere dove trovare\
        \ la documentazione\n\nReturns:\n    dict: Informazioni generali sull'applicazione\n\
        \nExample:\n    ```bash\n    curl http://localhost:8000/\n    ```\n\n    Response:\n\
        \    ```json\n    {\n      \"app\": \"Gestionale Collaboratori e Progetti\"\
        ,\n      \"version\": \"1.0.0\",\n      \"status\": \"online\",\n      \"\
        docs\": \"/docs\"\n    }\n    ```"
      operationId: root__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /health:
    get:
      tags:
      - Sistema
      summary: Health Check
      description: "**Health Check** - Verifica stato del sistema\n\nEndpoint per\
        \ monitorare lo stato dell'applicazione e delle sue dipendenze.\n\nUTILIZZO:\n\
        - Load balancer: verificare se instradare traffico a questo server\n- Monitoring:\
        \ Prometheus, Grafana, Datadog\n- CI/CD: verificare che il deploy sia riuscito\n\
        - Docker/Kubernetes: health check automatici\n\nCHECKS ESEGUITI:\n- API: sempre\
        \ \"ok\" se l'endpoint risponde\n- Database: (TODO) verifica connessione\n\
        - Cache: (TODO) verifica Redis\n- Storage: (TODO) verifica spazio disco\n\n\
        Returns:\n    JSONResponse: Stato dettagliato del sistema\n\nStatus Codes:\n\
        \    - 200: Sistema completamente sano\n    - 503: Sistema parzialmente degradato\
        \ (Service Unavailable)\n\nExample:\n    ```bash\n    curl http://localhost:8000/health\n\
        \    ```\n\n    Response (tutto ok):\n    ```json\n    {\n      \"status\"\
        : \"healthy\",\n      \"timestamp\": \"2025-01-05T10:30:00\",\n      \"version\"\
        : \"1.0.0\",\n      \"checks\": {\n        \"api\": \"ok\",\n        \"database\"\
        : \"ok\",\n        \"cache\": \"ok\"\n      }\n    }\n    ```"
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /version:
    get:
      tags:
      - Sistema
      summary: Version Info
      description: "**Informazioni Versione** - Dettagli ambiente e configurazione\n\
        \nRestituisce informazioni dettagliate su versione, ambiente e configurazione.\n\
        \nUTILITÀ:\n- Debugging: capire in quale ambiente sta girando l'app\n- Deploy:\
        \ verificare che la versione deployata sia quella corretta\n- Support: fornire\
        \ info tecniche per supporto utenti\n\nReturns:\n    dict: Informazioni dettagliate\
        \ su versione e configurazione\n\nExample:\n    ```bash\n    curl http://localhost:8000/version\n\
        \    ```\n\n    Response:\n    ```json\n    {\n      \"app_name\": \"Gestionale\
        \ Collaboratori e Progetti\",\n      \"version\": \"1.0.0\",\n      \"environment\"\
        : \"development\",\n      \"debug\": true,\n      \"features\": {\n      \
        \  \"swagger_docs\": true,\n        \"monitoring\": true,\n        \"auto_backup\"\
        : false\n      }\n    }\n    ```"
      operationId: version_info_version_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
